<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zeno — Vault Explorer (Tool)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../theme/tokens.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-display);
      background: var(--color-bg);
      color: var(--color-text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 32px;
    }

    /* Header — compact */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0 16px;
      border-bottom: 1px solid var(--color-border);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-icon {
      width: 22px;
      height: 22px;
      background: var(--color-accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 11px;
      color: #0b0b0b;
    }
    .logo-text {
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.01em;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .search-bar {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: var(--color-text-primary);
      font-family: inherit;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar::placeholder { color: var(--color-text-muted); }
    .search-bar:focus { border-color: var(--color-accent); }

    .header-address {
      font-size: 12px;
      color: var(--color-text-secondary);
      font-family: var(--font-mono);
      background: var(--color-surface);
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--color-border);
    }
    .btn-connect {
      background: var(--color-accent);
      color: #0b0b0b;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-connect:hover { background: var(--color-accent-hover); }

    /* Tab navigation */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--color-border);
      margin-top: 0;
    }
    .tab {
      padding: 14px 24px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: inherit;
    }
    .tab:hover { color: var(--color-text-secondary); }
    .tab.active {
      color: var(--color-text-primary);
      border-bottom-color: var(--color-accent);
    }

    /* Stat bar */
    .stat-bar {
      display: flex;
      gap: 24px;
      padding: 18px 0;
      border-bottom: 1px solid var(--color-border-light);
    }
    .stat {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .stat-value {
      font-weight: 600;
      font-size: 16px;
      font-family: var(--font-mono);
    }
    .stat-label {
      font-size: 12px;
      color: var(--color-text-muted);
    }
    .stat-up { color: var(--color-success); }
    .stat-neutral { color: var(--color-text-secondary); }

    /* Filters bar */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 0 12px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      font-family: inherit;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--color-text-muted); color: var(--color-text-secondary); }
    .filter-btn.active {
      background: var(--color-accent-subtle);
      border-color: var(--color-accent);
      color: var(--color-accent);
    }
    .filter-label {
      font-size: 12px;
      color: var(--color-text-muted);
      font-weight: 500;
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      margin: 0 -32px;
      padding: 0 32px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 12px 12px 12px 0;
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      border-bottom: 1px solid var(--color-border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: color 0.15s;
    }
    th:hover { color: var(--color-text-secondary); }
    th::after {
      content: ' ↕';
      font-size: 10px;
      opacity: 0.4;
    }
    th.sorted-asc::after { content: ' ↑'; opacity: 1; color: var(--color-accent); }
    th.sorted-desc::after { content: ' ↓'; opacity: 1; color: var(--color-accent); }

    td {
      padding: 12px 12px 12px 0;
      border-bottom: 1px solid var(--color-border-light);
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }

    .cell-name { font-weight: 500; }
    .cell-type {
      font-size: 12px;
      color: var(--color-text-secondary);
    }
    .cell-balance { font-family: var(--font-mono); font-weight: 500; }
    .cell-value { font-family: var(--font-mono); color: var(--color-text-secondary); font-size: 12px; }
    .cell-date { color: var(--color-text-secondary); font-size: 12px; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-active { background: rgba(54, 179, 126, 0.12); color: var(--color-active); }
    .badge-dormant { background: rgba(255, 171, 0, 0.12); color: var(--color-dormant); }
    .badge-matured { background: rgba(85, 85, 85, 0.2); color: var(--color-matured); }

    .row-link {
      color: var(--color-text-muted);
      font-size: 16px;
      cursor: pointer;
      transition: color 0.15s;
    }
    tr:hover .row-link { color: var(--color-accent); }

    tr.selected {
      background: var(--color-accent-subtle);
    }
    tr.selected td {
      border-bottom-color: transparent;
    }

    /* Detail bar (appears below table on selection) */
    .detail-bar {
      display: none;
      margin-top: 16px;
      padding: 20px 24px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      align-items: center;
      justify-content: space-between;
      animation: fadeSlideUp 0.2s var(--ease-out);
    }
    .detail-bar.open { display: flex; }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .detail-info {
      display: flex;
      gap: 32px;
      align-items: center;
    }
    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .detail-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-muted);
      font-weight: 600;
    }
    .detail-val {
      font-size: 14px;
      font-weight: 500;
    }
    .detail-actions {
      display: flex;
      gap: 8px;
    }
    .btn-sm {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-sm.primary { background: var(--color-accent); color: #0b0b0b; }
    .btn-sm.primary:hover { background: var(--color-accent-hover); }
    .btn-sm.secondary { background: var(--color-surface-elevated); color: var(--color-text-secondary); border: 1px solid var(--color-border); }
    .btn-sm.secondary:hover { border-color: var(--color-text-muted); color: var(--color-text-primary); }

    @media (max-width: 900px) {
      .app { padding: 0 16px; }
      .table-wrap { margin: 0 -16px; padding: 0 16px; }
      .search-bar { width: 140px; }
      .stat-bar { flex-wrap: wrap; gap: 16px; }
      .detail-bar { flex-direction: column; gap: 16px; align-items: stretch; }
      .detail-info { flex-wrap: wrap; gap: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">Z</div>
        <span class="logo-text">Zeno</span>
      </div>
      <div class="header-right">
        <input class="search-bar" type="text" placeholder="Search vaults..." id="searchInput" />
        <span class="header-address">0x71C7…9bE3</span>
        <button class="btn-connect">Disconnect</button>
      </div>
    </header>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="overview">Overview</button>
      <button class="tab" data-tab="vaults">Vaults</button>
      <button class="tab" data-tab="activity">Activity</button>
      <button class="tab" data-tab="analytics">Analytics</button>
    </div>

    <!-- Stat bar -->
    <div class="stat-bar">
      <div class="stat"><span class="stat-value stat-up">$12.4M</span><span class="stat-label">TVL</span></div>
      <div class="stat"><span class="stat-value">847</span><span class="stat-label">Vaults</span></div>
      <div class="stat"><span class="stat-value stat-up">$342K</span><span class="stat-label">24h Volume</span></div>
      <div class="stat"><span class="stat-value stat-neutral">12.4%</span><span class="stat-label">Avg APR</span></div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <span class="filter-label">Status:</span>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="dormant">Dormant</button>
      <button class="filter-btn" data-filter="matured">Matured</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-sort="name">Vault</th>
            <th data-sort="type">Type</th>
            <th data-sort="balance">Balance</th>
            <th data-sort="value">Value (USD)</th>
            <th data-sort="created">Created</th>
            <th data-sort="status">Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- JS fills -->
        </tbody>
      </table>
    </div>

    <!-- Detail bar -->
    <div class="detail-bar" id="detailBar">
      <div class="detail-info">
        <div class="detail-item">
          <span class="detail-label">Vault</span>
          <span class="detail-val" id="dName">—</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Balance</span>
          <span class="detail-val" id="dBalance">—</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Status</span>
          <span class="detail-val" id="dStatus">—</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Vesting</span>
          <span class="detail-val" id="dVesting">—</span>
        </div>
      </div>
      <div class="detail-actions">
        <button class="btn-sm secondary">Withdraw</button>
        <button class="btn-sm primary">Deposit</button>
      </div>
    </div>
  </div>

  <script>
    const vaults = [
      { name: 'Alpha Vault', type: 'Standard', balance: 45.20, usd: 3619840, created: '2025-03-12', status: 'active', vesting: '2026-10-14' },
      { name: 'Treasury Vault', type: 'Hybrid', balance: 12.80, usd: 1024640, created: '2024-11-03', status: 'dormant', vesting: '2025-12-07' },
      { name: 'Yield Vault #42', type: 'Standard', balance: 8.34, usd: 667867, created: '2025-06-21', status: 'active', vesting: '2028-06-25' },
      { name: 'Institutional Pool', type: 'Delegated', balance: 22.00, usd: 1761600, created: '2025-02-08', status: 'active', vesting: '2028-03-14' },
      { name: 'Long Hold Vault', type: 'Hybrid', balance: 3.50, usd: 280280, created: '2022-05-01', status: 'matured', vesting: '2025-06-04' },
      { name: 'BTC Farm #7', type: 'Standard', balance: 6.22, usd: 498177, created: '2025-04-18', status: 'active', vesting: '2027-04-22' },
      { name: 'Partner Pool A', type: 'Delegated', balance: 18.75, usd: 1501500, created: '2025-01-15', status: 'dormant', vesting: '2026-01-19' },
      { name: 'Mega Vault', type: 'Standard', balance: 92.10, usd: 7375560, created: '2025-05-30', status: 'active', vesting: '2027-06-03' },
    ];

    let sortKey = null;
    let sortDir = 'asc';
    let filterVal = 'all';
    let searchVal = '';
    let selectedRow = null;

    function formatUSD(n) {
      if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
      return '$' + n;
    }

    function getFiltered() {
      return vaults.filter(v => {
        if (filterVal !== 'all' && v.status !== filterVal) return false;
        if (searchVal && !v.name.toLowerCase().includes(searchVal.toLowerCase())) return false;
        return true;
      });
    }

    function render() {
      const tbody = document.getElementById('tableBody');
      let items = getFiltered();
      if (sortKey) {
        items = [...items].sort((a, b) => {
          let va = a[sortKey], vb = b[sortKey];
          if (typeof va === 'string') va = va.toLowerCase();
          if (typeof vb === 'string') vb = vb.toLowerCase();
          if (va < vb) return sortDir === 'asc' ? -1 : 1;
          if (va > vb) return sortDir === 'asc' ? 1 : -1;
          return 0;
        });
      }
      tbody.innerHTML = '';
      items.forEach((v, idx) => {
        const tr = document.createElement('tr');
        if (selectedRow === v.name) tr.classList.add('selected');
        tr.innerHTML = `
          <td class="cell-name">${v.name}</td>
          <td class="cell-type">${v.type}</td>
          <td class="cell-balance">${v.balance.toFixed(2)} BTC</td>
          <td class="cell-value">${formatUSD(v.usd)}</td>
          <td class="cell-date">${v.created}</td>
          <td><span class="badge badge-${v.status}">${v.status}</span></td>
          <td><span class="row-link">→</span></td>
        `;
        tr.addEventListener('click', () => selectVault(v));
        tbody.appendChild(tr);
      });
    }

    function selectVault(v) {
      selectedRow = v.name;
      document.getElementById('dName').textContent = v.name;
      document.getElementById('dBalance').textContent = v.balance.toFixed(2) + ' BTC (' + formatUSD(v.usd) + ')';
      document.getElementById('dStatus').textContent = v.status.charAt(0).toUpperCase() + v.status.slice(1);
      document.getElementById('dVesting').textContent = v.vesting;
      document.getElementById('detailBar').classList.add('open');
      render();
    }

    // Sorting
    document.querySelectorAll('th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const key = th.dataset.sort;
        if (sortKey === key) {
          sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          sortKey = key;
          sortDir = 'asc';
        }
        document.querySelectorAll('th[data-sort]').forEach(t => {
          t.classList.remove('sorted-asc', 'sorted-desc');
        });
        th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
        render();
      });
    });

    // Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterVal = btn.dataset.filter;
        selectedRow = null;
        document.getElementById('detailBar').classList.remove('open');
        render();
      });
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchVal = e.target.value;
      selectedRow = null;
      document.getElementById('detailBar').classList.remove('open');
      render();
    });

    // Tab switching (cosmetic only)
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });

    render();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zeno — Protocol Explorer (Split)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../theme/tokens.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-display);
      background: var(--color-bg);
      color: var(--color-text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow: hidden;
    }

    /* App shell */
    .shell {
      display: flex;
      height: 100vh;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--color-surface);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      padding: 0;
    }
    .sidebar-header {
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--color-border-light);
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .sidebar-icon {
      width: 24px;
      height: 24px;
      background: var(--color-accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      color: #0b0b0b;
    }
    .sidebar-name {
      font-weight: 600;
      font-size: 14px;
    }

    .sidebar-nav {
      padding: 12px 0;
      flex: 1;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: all 0.15s;
      border-left: 2px solid transparent;
    }
    .nav-item:hover {
      color: var(--color-text-secondary);
      background: var(--color-surface-hover);
    }
    .nav-item.active {
      color: var(--color-text-primary);
      border-left-color: var(--color-accent);
      background: var(--color-accent-subtle);
    }
    .nav-icon {
      font-size: 14px;
      width: 20px;
      text-align: center;
      opacity: 0.6;
    }
    .nav-item.active .nav-icon { opacity: 1; }

    .sidebar-footer {
      padding: 14px 18px;
      border-top: 1px solid var(--color-border-light);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-address {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--color-text-muted);
    }

    /* ─── Main area ─── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Vault list (center panel) */
    .vault-panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px 28px;
      min-width: 0;
    }
    .vault-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .vault-panel-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .vault-panel-sub {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-top: 4px;
    }
    .vault-panel-actions {
      display: flex;
      gap: 8px;
    }
    .btn-action {
      background: var(--color-surface-elevated);
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-action:hover { border-color: var(--color-text-muted); color: var(--color-text-primary); }
    .btn-action.primary {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #0b0b0b;
    }
    .btn-action.primary:hover { background: var(--color-accent-hover); }

    /* Vault cards (list view) */
    .vault-cards {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .vault-card {
      display: grid;
      grid-template-columns: 1fr 120px 100px 80px;
      align-items: center;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      gap: 12px;
    }
    .vault-card:hover {
      background: var(--color-surface-hover);
    }
    .vault-card.selected {
      background: var(--color-accent-subtle);
      border: 1px solid rgba(247, 147, 26, 0.2);
      margin: -1px;
    }
    .vc-name {
      font-weight: 500;
      font-size: 14px;
    }
    .vc-meta {
      font-size: 11px;
      color: var(--color-text-muted);
      margin-top: 2px;
    }
    .vc-balance {
      font-family: var(--font-mono);
      font-weight: 500;
      font-size: 14px;
      text-align: right;
    }
    .vc-usd {
      font-size: 11px;
      color: var(--color-text-muted);
      font-family: var(--font-mono);
      text-align: right;
    }
    .vc-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
      padding: 4px 8px;
      border-radius: 100px;
    }
    .vc-badge.active { background: rgba(54, 179, 126, 0.12); color: var(--color-active); }
    .vc-badge.dormant { background: rgba(255, 171, 0, 0.12); color: var(--color-dormant); }
    .vc-badge.matured { background: rgba(85, 85, 85, 0.2); color: var(--color-matured); }

    /* ─── Detail panel (right) ─── */
    .detail-panel {
      width: 340px;
      flex-shrink: 0;
      border-left: 1px solid var(--color-border);
      background: var(--color-surface);
      overflow-y: auto;
      padding: 28px 24px;
      transition: opacity 0.2s;
    }
    .detail-panel.empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--color-text-muted);
    }
    .detail-empty-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--color-accent-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 12px;
    }
    .detail-empty-text {
      font-size: 13px;
      line-height: 1.6;
      max-width: 200px;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    .detail-title {
      font-size: 16px;
      font-weight: 600;
    }
    .detail-type {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-top: 2px;
    }
    .detail-status-badge {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 4px 12px;
      border-radius: 100px;
    }
    .detail-status-badge.active { background: rgba(54, 179, 126, 0.12); color: var(--color-active); }
    .detail-status-badge.dormant { background: rgba(255, 171, 0, 0.12); color: var(--color-dormant); }
    .detail-status-badge.matured { background: rgba(85, 85, 85, 0.2); color: var(--color-matured); }

    .detail-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    .detail-metric {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .dm-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-muted);
      font-weight: 600;
    }
    .dm-value {
      font-size: 18px;
      font-weight: 500;
      font-family: var(--font-mono);
    }
    .dm-sub {
      font-size: 11px;
      color: var(--color-text-muted);
    }

    .detail-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-muted);
      font-weight: 600;
      margin-bottom: 12px;
    }

    .detail-timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 28px;
    }
    .timeline-item {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      border-left: 1px solid var(--color-border);
      padding-left: 16px;
      position: relative;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 12px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--color-border);
    }
    .timeline-item:first-child::before { background: var(--color-accent); }
    .timeline-date {
      font-size: 11px;
      color: var(--color-text-muted);
      font-family: var(--font-mono);
      flex-shrink: 0;
      width: 80px;
    }
    .timeline-text {
      font-size: 12px;
      color: var(--color-text-secondary);
    }

    .detail-actions {
      display: flex;
      gap: 8px;
    }
    .btn-detail-action {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-detail-action.primary { background: var(--color-accent); color: #0b0b0b; }
    .btn-detail-action.primary:hover { background: var(--color-accent-hover); }
    .btn-detail-action.secondary { background: var(--color-surface-elevated); color: var(--color-text-secondary); border: 1px solid var(--color-border); }
    .btn-detail-action.secondary:hover { border-color: var(--color-text-muted); color: var(--color-text-primary); }

    /* Scrollbar styling */
    .vault-panel::-webkit-scrollbar,
    .detail-panel::-webkit-scrollbar {
      width: 4px;
    }
    .vault-panel::-webkit-scrollbar-track,
    .detail-panel::-webkit-scrollbar-track {
      background: transparent;
    }
    .vault-panel::-webkit-scrollbar-thumb {
      background: var(--color-border);
      border-radius: 4px;
    }

    @media (max-width: 1024px) {
      .detail-panel { width: 280px; }
    }
    @media (max-width: 800px) {
      .sidebar { width: 56px; }
      .sidebar-name, .nav-item span:last-child, .sidebar-address { display: none; }
      .sidebar-header { padding: 16px 12px; }
      .nav-item { justify-content: center; padding: 12px; }
      .detail-panel { width: 240px; }
      .vault-card { grid-template-columns: 1fr 80px 70px; }
      .vc-usd { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="sidebar-icon">Z</div>
          <span class="sidebar-name">Zeno</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item active">
          <span class="nav-icon">◉</span>
          <span>Dashboard</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">▦</span>
          <span>Vaults</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">◎</span>
          <span>Issuers</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">⟳</span>
          <span>Activity</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">◈</span>
          <span>Analytics</span>
        </div>
      </nav>
      <div class="sidebar-footer">
        <span class="nav-icon" style="opacity:0.6;">⊕</span>
        <span class="sidebar-address">0x71C7…9bE3</span>
      </div>
    </aside>

    <!-- Main area -->
    <div class="main">
      <!-- Vault list panel -->
      <div class="vault-panel">
        <div class="vault-panel-header">
          <div>
            <div class="vault-panel-title">Your Vaults</div>
            <div class="vault-panel-sub">847 active · $12.4M TVL</div>
          </div>
          <div class="vault-panel-actions">
            <button class="btn-action">Filter</button>
            <button class="btn-action primary" id="createBtn">+ New</button>
          </div>
        </div>
        <div class="vault-cards" id="vaultCards">
          <!-- JS fills -->
        </div>
      </div>

      <!-- Detail panel -->
      <div class="detail-panel empty" id="detailPanel">
        <div class="detail-empty-icon">⊡</div>
        <div class="detail-empty-text">Select a vault to view details and take actions.</div>
      </div>
    </div>
  </div>

  <script>
    const vaults = [
      { name: 'Alpha Vault', type: 'Standard', balance: 45.20, usd: 3619840, status: 'active', created: '2025-03-12', vesting: '2026-10-14', apr: '12.0%', maturity: '2028-03-12' },
      { name: 'Treasury Vault', type: 'Hybrid', balance: 12.80, usd: 1024640, status: 'dormant', created: '2024-11-03', vesting: '2025-12-07', apr: '8.4%', maturity: '2027-11-03' },
      { name: 'Yield Vault #42', type: 'Standard', balance: 8.34, usd: 667867, status: 'active', created: '2025-06-21', vesting: '2028-06-25', apr: '12.0%', maturity: '2028-06-21' },
      { name: 'Institutional Pool', type: 'Delegated', balance: 22.00, usd: 1761600, status: 'active', created: '2025-02-08', vesting: '2028-03-14', apr: '9.6%', maturity: '2028-02-08' },
      { name: 'Long Hold Vault', type: 'Hybrid', balance: 3.50, usd: 280280, status: 'matured', created: '2022-05-01', vesting: '2025-06-04', apr: '6.2%', maturity: '2025-05-01' },
      { name: 'BTC Farm #7', type: 'Standard', balance: 6.22, usd: 498177, status: 'active', created: '2025-04-18', vesting: '2027-04-22', apr: '12.0%', maturity: '2028-04-18' },
      { name: 'Partner Pool A', type: 'Delegated', balance: 18.75, usd: 1501500, status: 'dormant', created: '2025-01-15', vesting: '2026-01-19', apr: '9.6%', maturity: '2028-01-15' },
      { name: 'Mega Vault', type: 'Standard', balance: 92.10, usd: 7375560, status: 'active', created: '2025-05-30', vesting: '2027-06-03', apr: '12.0%', maturity: '2028-05-30' },
    ];

    let selectedIdx = null;

    function formatUSD(n) {
      if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
      return '$' + n;
    }

    function formatDate(d) {
      const dt = new Date(d);
      return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderList() {
      const container = document.getElementById('vaultCards');
      container.innerHTML = '';
      vaults.forEach((v, i) => {
        const card = document.createElement('div');
        card.className = 'vault-card' + (selectedIdx === i ? ' selected' : '');
        card.innerHTML = `
          <div>
            <div class="vc-name">${v.name}</div>
            <div class="vc-meta">${v.type} · Created ${formatDate(v.created)}</div>
          </div>
          <div>
            <div class="vc-balance">${v.balance.toFixed(2)} BTC</div>
            <div class="vc-usd">${formatUSD(v.usd)}</div>
          </div>
          <div class="vc-badge ${v.status}">${v.status}</div>
          <div class="vc-meta" style="text-align:right;">${v.apr}</div>
        `;
        card.addEventListener('click', () => selectVault(i));
        container.appendChild(card);
      });
    }

    function selectVault(i) {
      selectedIdx = i;
      renderList();
      renderDetail(vaults[i]);
    }

    function renderDetail(v) {
      const panel = document.getElementById('detailPanel');
      panel.className = 'detail-panel';
      panel.innerHTML = `
        <div class="detail-header">
          <div>
            <div class="detail-title">${v.name}</div>
            <div class="detail-type">${v.type} · Created ${formatDate(v.created)}</div>
          </div>
          <div class="detail-status-badge ${v.status}">${v.status}</div>
        </div>

        <div class="detail-metrics">
          <div class="detail-metric">
            <span class="dm-label">Balance</span>
            <span class="dm-value">${v.balance.toFixed(2)}</span>
            <span class="dm-sub">${formatUSD(v.usd)}</span>
          </div>
          <div class="detail-metric">
            <span class="dm-label">APR</span>
            <span class="dm-value">${v.apr}</span>
            <span class="dm-sub">Annual yield</span>
          </div>
          <div class="detail-metric">
            <span class="dm-label">Vesting</span>
            <span class="dm-value" style="font-size:14px;">${formatDate(v.vesting)}</span>
            <span class="dm-sub">Next milestone</span>
          </div>
          <div class="detail-metric">
            <span class="dm-label">Maturity</span>
            <span class="dm-value" style="font-size:14px;">${formatDate(v.maturity)}</span>
            <span class="dm-sub">Full unlock</span>
          </div>
        </div>

        <div class="detail-section-title">Activity</div>
        <div class="detail-timeline">
          <div class="timeline-item">
            <span class="timeline-date">${formatDate(new Date())}</span>
            <span class="timeline-text">Collateral rebalanced via delegation</span>
          </div>
          <div class="timeline-item">
            <span class="timeline-date">${formatDate(Date.now() - 3*86400000)}</span>
            <span class="timeline-text">Vesting milestone reached · 45.2 BTC available</span>
          </div>
          <div class="timeline-item">
            <span class="timeline-date">${formatDate(Date.now() - 14*86400000)}</span>
            <span class="timeline-text">Deposit confirmed · +10.0 BTC</span>
          </div>
          <div class="timeline-item">
            <span class="timeline-date">${formatDate(Date.now() - 60*86400000)}</span>
            <span class="timeline-text">Vault created</span>
          </div>
        </div>

        <div class="detail-section-title">Actions</div>
        <div class="detail-actions">
          <button class="btn-detail-action secondary">Withdraw</button>
          <button class="btn-detail-action primary">Deposit</button>
        </div>
      `;
    }

    renderList();
  </script>
</body>
</html>
